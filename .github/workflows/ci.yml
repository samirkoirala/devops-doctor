name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          go mod verify
          go vet ./...
          go test ./...

      - name: Build
        run: go build -v -o devops-doctor ./cmd/devops-doctor

      - name: Smoke run
        run: ./devops-doctor check docker 2>/dev/null || true
